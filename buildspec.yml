version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm install

  build:
    commands:
      - echo "Building project..."
      - npm run build
      - echo "Preparing deployment artifacts..."
      - mkdir -p dist
      - cp -r src package.json dist/

  post_build:
    commands:
      - echo "Syncing build artifacts to S3..."
      - aws s3 sync dist/ s3://$S3_BUCKET --delete
      - echo "Deployment complete!"

artifacts:
  files:
    - '**/*'
  base-directory: 'dist'

cache:
  paths:
    - 'node_modules/**/*'
